<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in — Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/library.css}">
</head>
<body class="auth-page">
    <div class="orb orb--1" aria-hidden="true"></div>
    <div class="orb orb--2" aria-hidden="true"></div>
    <div class="orb orb--3" aria-hidden="true"></div>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-badge"><span class="icon" aria-hidden="true">📚</span> Welcome back</div>
            <h1>Library portal</h1>
            <p class="auth-sub">Sign in to browse books, borrow, and manage the catalog.</p>

            <div th:if="${message}" class="alert alert--error" role="alert" th:text="${message}"></div>

            <form method="post" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input id="username" type="text" name="username" placeholder="your.username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">Sign in →</button>
            </form>

            <p class="auth-footer">New here? <a href="/register">Create an account</a></p>
        </div>
    </div>
</body>
</html>

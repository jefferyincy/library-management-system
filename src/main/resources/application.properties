spring.thymeleaf.cache=false

# Load application-local.properties on the classpath when no profile is set (local dev). Production sets SPRING_PROFILES_ACTIVE=prod so this file is not used.
spring.profiles.default=local

# Optional: root-level overrides when you run from the project directory (file wins over classpath for duplicate keys).
spring.config.import=optional:classpath:application-local.properties,optional:file:./application-local.properties

# Where books.dat, users.dat, issues.dat live (override in production, e.g. /data)
library.data-dir=${LIBRARY_DATA_DIR:.}

# Trust X-Forwarded-* when behind a reverse proxy (Railway, Render, Fly, nginx)
server.forward-headers-strategy=framework

# --- Email (optional). Borrow confirmations are skipped until you set spring.mail.host. ---
# Example (Gmail): use an App Password, not your normal password.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youraddress@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
# From header (defaults to spring.mail.username if empty):
# library.mail.from=youraddress@gmail.com
# library.mail.from-personal=City Library

# --- OpenAI for student help chat (optional). Prefer env OPENAI_API_KEY — do not commit real keys. ---
library.ai.openai.api-key=${OPENAI_API_KEY:}
library.ai.openai.model=gpt-4o-mini
# If the API returns 401, set these from platform.openai.com → Settings (some orgs require them):
library.ai.openai.organization-id=${OPENAI_ORGANIZATION_ID:}
library.ai.openai.project-id=${OPENAI_PROJECT_ID:}
